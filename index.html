
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="theme-color" content="#020408" />
    
    <!-- Base SEO -->
    <meta name="description" content="SGS GROUP - Pioneering AI, Automation, and Cloud Computing solutions for global business transformation." />
    <meta name="keywords" content="AI, Artificial Intelligence, Automation, Cloud Computing, Big Data, SGS Group, Vietnam Technology" />
    <meta name="author" content="SGS GROUP" />
    <meta name="robots" content="index, follow" />

    <title>SGS GROUP - Future Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Inter"', 'sans-serif'],
              display: ['"Space Grotesk"', 'sans-serif'],
              mono: ['"JetBrains Mono"', 'monospace'],
            },
            colors: {
              // --- 2026 PALETTE: CRYSTALLINE INTELLIGENCE (SYNCHRONIZED) ---
              canvas: {
                DEFAULT: '#020408', // Deep Void (Base)
                subtle: '#08090B',  // Panels
                elevated: '#0F1115', // Cards
              },
              surface: {
                glass: 'rgba(255, 255, 255, 0.03)',
                glassHigh: 'rgba(255, 255, 255, 0.08)', // Increased visibility
                border: 'rgba(255, 255, 255, 0.08)',
                borderHigh: 'rgba(255, 255, 255, 0.15)',
              },
              primary: {
                DEFAULT: '#06B6D4', // Cyan Core
                glow: '#22D3EE',    // Cyan Glow
                dim: 'rgba(6, 182, 212, 0.1)',
                dark: '#0891B2'
              },
              accent: {
                DEFAULT: '#6366F1', // Indigo Deep
                glow: '#818CF8',
              },
              status: {
                success: '#10B981', // Emerald
                warning: '#F59E0B', // Amber
                error: '#EF4444',   // Red
              }
            },
            boxShadow: {
                'neon-cyan': '0 0 20px rgba(6, 182, 212, 0.25)',
                'glass-lg': '0 24px 60px -12px rgba(0, 0, 0, 0.6)',
                // THE CRYSTAL EDGE: Critical for the 3D look
                'inner-light': 'inset 0 1px 0 0 rgba(255, 255, 255, 0.15)', 
                'inner-glow': 'inset 0 0 20px rgba(6, 182, 212, 0.05)',
            },
            backgroundImage: {
               'tech-grid': 'linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px)',
               'aurora-gradient': 'radial-gradient(circle at 50% -20%, rgba(6, 182, 212, 0.15) 0%, rgba(2, 4, 8, 0) 50%)',
            },
            animation: {
              'spin-slow': 'spin 12s linear infinite',
              'shine': 'shine 4s cubic-bezier(0.4, 0, 0.2, 1) infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'marquee': 'marquee 40s linear infinite',
              'scanline': 'scanline 8s linear infinite',
              'fade-in-up': 'fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'float': 'float 6s ease-in-out infinite',
              'border-beam': 'borderBeam 8s linear infinite',
            },
            keyframes: {
              shine: {
                '0%': { transform: 'translateX(-150%) skewX(-20deg)' },
                '100%': { transform: 'translateX(150%) skewX(-20deg)' },
              },
              marquee: {
                '0%': { transform: 'translateX(0%)' },
                // UPDATED: Move -50% for seamless loop with duplicated content
                '100%': { transform: 'translateX(-50%)' },
              },
              scanline: {
                '0%': { transform: 'translateY(-100%)' },
                '100%': { transform: 'translateY(100%)' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              borderBeam: {
                '0%, 100%': { opacity: '0' },
                '50%': { opacity: '1' },
              }
            },
          },
        },
      }
    </script>
    <style>
      body {
        background-color: #020408;
        color: #e2e8f0;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      
      .noise-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 9999; 
        mix-blend-mode: overlay;
      }

      /* GLOBAL SCROLLBAR (Browser) */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #020408; }
      ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #06b6d4; }

      /* CUSTOM INTERNAL SCROLLBAR (Chat/Logs) - Top 1 Detail */
      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(6, 182, 212, 0.5); }

      .preserve-3d { transform-style: preserve-3d; }
      
      /* High-end Selection Color */
      ::selection { background: rgba(6, 182, 212, 0.2); color: #22d3ee; }
    </style>
</head>
  <body>
    <div class="noise-overlay"></div>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
